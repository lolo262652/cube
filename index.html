<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Atelier Cube 3D</title>
    <link rel="stylesheet" href="./styles.css?v=scene-fallback" />
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.164.1/build/three.module.js"
        }
      }
    </script>
  </head>
  <body>
    <main class="app">
      <section class="workspace" aria-label="Apercu 3D du cube">
        <div class="topbar">
          <div>
            <p class="eyebrow">Atelier 3D</p>
            <h1>Cube personnalisable</h1>
          </div>
          <div class="toolbar">
            <button id="reset-view" class="icon-button" title="Recentrer la vue" aria-label="Recentrer la vue">
              ↺
            </button>
            <button id="export-stl" class="primary">Exporter STL</button>
            <button id="save-project" class="secondary">Sauvegarder</button>
            <label class="secondary file-button">
              Charger
              <input id="load-project" type="file" accept="application/json" />
            </label>
          </div>
        </div>
        <div id="scene" class="scene">
          <div id="scene-fallback" class="scene-fallback">
            Le rendu 3D se charge. Si le cube n'apparait pas, ouvre l'application avec http://localhost:8000/index.html.
          </div>
        </div>
        <div class="statusbar">
          <span id="print-size">Cube 50 mm</span>
          <span id="face-status">Face avant selectionnee</span>
        </div>
      </section>

      <aside class="controls" aria-label="Reglages du cube">
        <section class="control-section">
          <div class="section-title">
            <h2>Face</h2>
            <span id="active-face-label">Avant</span>
          </div>
          <div class="face-grid" role="group" aria-label="Choisir une face">
            <button class="face-button active" data-face="front">Avant</button>
            <button class="face-button" data-face="back">Arriere</button>
            <button class="face-button" data-face="right">Droite</button>
            <button class="face-button" data-face="left">Gauche</button>
            <button class="face-button" data-face="top">Dessus</button>
            <button class="face-button" data-face="bottom">Dessous</button>
          </div>
          <label class="field">
            <span>Texte</span>
            <textarea id="face-text" maxlength="48" rows="2" placeholder="Ligne 1&#10;Ligne 2"></textarea>
          </label>
          <label class="field">
            <span>Police</span>
            <select id="font-family">
              <option value="Arial" selected>Arial</option>
              <option value="Impact">Impact</option>
              <option value="Verdana">Verdana</option>
              <option value="Georgia">Georgia</option>
              <option value="Courier New">Courier New</option>
              <option value="Trebuchet MS">Trebuchet MS</option>
              <option value="Times New Roman">Times New Roman</option>
            </select>
          </label>
        </section>

        <section class="control-section">
          <h2>Dimensions</h2>
          <label class="range-field">
            <span>Taille du cube <strong id="size-value">39 mm</strong></span>
            <input id="cube-size" type="range" min="20" max="120" value="39" />
          </label>
          <label class="range-field">
            <span>Profondeur gravure <strong id="depth-value">1.6 mm</strong></span>
            <input id="text-depth" type="range" min="0.4" max="4" value="1.6" step="0.2" />
          </label>
          <label class="range-field">
            <span>Taille texte <strong id="text-size-value">79%</strong></span>
            <input id="text-size" type="range" min="35" max="90" value="79" />
          </label>
          <label class="range-field">
            <span>Hauteur ligne 1 <strong id="line-1-value">40%</strong></span>
            <input id="line-1-y" type="range" min="8" max="48" value="40" />
          </label>
          <label class="range-field">
            <span>Hauteur ligne 2 <strong id="line-2-value">72%</strong></span>
            <input id="line-2-y" type="range" min="52" max="94" value="72" />
          </label>
          <label class="range-field">
            <span>Arrondi du cube <strong id="corner-value">2.0 mm</strong></span>
            <input id="corner-radius" type="range" min="1" max="18" value="2" step="0.5" />
          </label>
        </section>

        <section class="control-section">
          <h2>Couleurs apercu</h2>
          <label class="color-field">
            <span>Cube</span>
            <input id="cube-color" type="color" value="#e8eef2" />
          </label>
          <label class="color-field">
            <span>Texte</span>
            <input id="text-color" type="color" value="#1b6f9b" />
          </label>
        </section>

        <section class="control-section compact">
          <h2>Fichier</h2>
          <p id="save-state">Projet non sauvegarde</p>
        </section>
      </aside>
    </main>

    <script type="module" src="./tetris.js?v=scene-fallback"></script>
  </body>
</html>
